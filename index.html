<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro PDF | Image to PDF</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-bg: #ffffff;
            --preview-bg: #0f172a;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            background-color: var(--preview-bg);
            color: var(--text-main);
            overflow: hidden;
        }

        /* Responsive Fixes */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100% !important; height: 400px !important; border-right: none !important; }
        }

        /* Sidebar Styling */
        .sidebar {
            width: 360px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            z-index: 20;
            box-shadow: 10px 0 15px -3px rgba(0, 0, 0, 0.05);
        }

        .header-section { margin-bottom: 24px; }
        h1 { font-size: 1.5rem; font-weight: 700; color: #0f172a; letter-spacing: -0.025em; }
        .subtitle { font-size: 0.875rem; color: var(--text-muted); margin-top: 4px; }

        /* Upload Area */
        .upload-container {
            margin-bottom: 20px;
        }
        .btn-upload {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-main);
            transition: all 0.2s ease;
        }
        .btn-upload:hover { border-color: var(--accent); background: #eff6ff; color: var(--accent); }

        /* List Styling */
        #fileList {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            margin-bottom: 20px;
        }
        #fileList::-webkit-scrollbar { width: 4px; }
        #fileList::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .file-item {
            display: flex;
            align-items: center;
            background: #fff;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-bottom: 10px;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .file-item:hover { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border-color: #cbd5e1; }
        .sortable-ghost { opacity: 0.2; background: var(--accent); }

        .handle { color: #94a3b8; margin-right: 12px; font-size: 1.2rem; }
        .file-name { flex: 1; font-size: 0.8125rem; font-weight: 500; color: #334155; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .remove-btn { background: #fee2e2; color: #ef4444; border: none; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        .remove-btn:hover { background: #ef4444; color: white; }

        /* Bottom Actions */
        .actions { display: flex; flex-direction: column; gap: 10px; }
        .generate-btn {
            background: #0f172a;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9375rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .generate-btn:hover { background: #1e293b; transform: translateY(-1px); }
        .generate-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
        
        .clear-btn { background: none; border: none; color: var(--text-muted); font-size: 0.75rem; cursor: pointer; text-decoration: underline; }

        /* Preview Area */
        .preview-area {
            flex: 1;
            padding: 60px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
            scroll-behavior: smooth;
        }

        .preview-frame {
            position: relative;
            background: white;
            padding: 0;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .preview-frame img { display: block; width: 100%; height: auto; max-height: 85vh; }

        /* Glassmorphism Page Badge */
        .page-badge {
            position: absolute;
            left: -80px;
            top: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 1100px) {
            .page-badge { left: 20px; top: -40px; background: var(--accent); }
        }

        .empty-state {
            margin-top: 15vh;
            text-align: center;
            color: #475569;
        }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.2; }

        /* Spinner Animation */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header-section">
            <h1>PDF Gen Pro</h1>
            <p class="subtitle">Convert & organize images to PDF</p>
        </div>

        <div class="upload-container">
            <label class="btn-upload">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
                <span>Add Images</span>
                <input type="file" id="imageInput" accept="image/*" multiple style="display: none;">
            </label>
        </div>

        <div id="fileList"></div>

        <div class="actions">
            <button id="generateBtn" class="generate-btn" disabled>
                <div class="spinner" id="loader"></div>
                <span id="btnText">Download PDF</span>
            </button>
            <button class="clear-btn" id="clearAll">Clear all images</button>
        </div>
    </div>

    <div class="preview-area" id="previewArea">
        <div class="empty-state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <p>Your workspace is empty.<br>Upload images to begin.</p>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const previewArea = document.getElementById('previewArea');
        const fileList = document.getElementById('fileList');
        const generateBtn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        
        let imagesArray = [];

        new Sortable(fileList, {
            animation: 200,
            handle: '.file-item',
            ghostClass: 'sortable-ghost',
            onEnd: () => {
                const newOrder = [];
                fileList.querySelectorAll('.file-item').forEach(el => {
                    newOrder.push(imagesArray.find(img => img.id === el.getAttribute('data-id')));
                });
                imagesArray = newOrder;
                renderPreviews();
            }
        });

        imageInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const dataUrl = await readFile(file);
                const dims = await getDims(dataUrl);
                imagesArray.push({
                    id: Math.random().toString(36).substr(2, 9),
                    name: file.name,
                    data: dataUrl,
                    w: dims.w,
                    h: dims.h
                });
            }
            renderAll();
            imageInput.value = '';
        });

        function readFile(file) { return new Promise(res => { const r = new FileReader(); r.onload = (e) => res(e.target.result); r.readAsDataURL(file); }); }
        function getDims(src) { return new Promise(res => { const i = new Image(); i.onload = () => res({ w: i.width, h: i.height }); i.src = src; }); }

        function renderAll() { renderList(); renderPreviews(); }

        function renderList() {
            fileList.innerHTML = '';
            imagesArray.forEach((img, i) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.setAttribute('data-id', img.id);
                item.innerHTML = `
                    <div class="handle">⠿</div>
                    <div class="file-name">${img.name}</div>
                    <button class="remove-btn" onclick="removeItem('${img.id}')">&times;</button>
                `;
                fileList.appendChild(item);
            });
            generateBtn.disabled = imagesArray.length === 0;
        }

        function renderPreviews() {
            previewArea.innerHTML = '';
            if (imagesArray.length === 0) {
                previewArea.innerHTML = `<div class="empty-state"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><p>Your workspace is empty.<br>Upload images to begin.</p></div>`;
                return;
            }
            imagesArray.forEach((img, i) => {
                const frame = document.createElement('div');
                frame.className = 'preview-frame';
                frame.style.width = img.w > img.h ? 'min(900px, 90%)' : 'min(550px, 80%)';
                frame.innerHTML = `<div class="page-badge">PAGE ${i+1}</div><img src="${img.data}">`;
                previewArea.appendChild(frame);
            });
        }

        window.removeItem = (id) => { imagesArray = imagesArray.filter(img => img.id !== id); renderAll(); };
        document.getElementById('clearAll').onclick = () => { imagesArray = []; renderAll(); };

        generateBtn.addEventListener('click', () => {
            loader.style.display = 'block';
            btnText.innerText = 'Generating...';
            generateBtn.disabled = true;

            // Small timeout to allow the spinner to render before JS freezes the thread for PDF generation
            setTimeout(() => {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: imagesArray[0].w > imagesArray[0].h ? 'l' : 'p',
                    unit: 'px',
                    format: [imagesArray[0].w, imagesArray[0].h]
                });

                imagesArray.forEach((img, i) => {
                    if (i > 0) pdf.addPage([img.w, img.h], img.w > img.h ? 'l' : 'p');
                    const fmt = img.data.includes('png') ? 'PNG' : 'JPEG';
                    pdf.addImage(img.data, fmt, 0, 0, img.w, img.h);
                });

                pdf.save('Document.pdf');
                loader.style.display = 'none';
                btnText.innerText = 'Download PDF';
                generateBtn.disabled = false;
            }, 100);
        });
    </script>
</body>
</html>
