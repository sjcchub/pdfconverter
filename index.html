<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to PDF - Reorder Enabled</title>
    <style>
        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f0f0;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 340px;
            background: white;
            border-right: 1px solid #ddd;
            padding: 24px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 10;
        }

        h1 { font-size: 1.3rem; margin: 0 0 8px 0; }
        .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 24px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fafafa;
            font-size: 0.8rem;
        }

        /* Reorderable List Items */
        .file-list { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .file-item {
            display: flex;
            align-items: center;
            background: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            border: 1px solid #ddd;
            transition: transform 0.2s;
        }

        .file-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
            font-weight: 500;
        }

        .controls {
            display: flex;
            gap: 4px;
        }

        .control-btn {
            border: 1px solid #eee;
            background: #f9f9f9;
            border-radius: 4px;
            cursor: pointer;
            padding: 2px 6px;
            font-size: 12px;
        }

        .control-btn:hover { background: #e0e0e0; }
        .remove-btn { color: #ff4d4f; border-color: #ffeef0; }
        .remove-btn:hover { background: #ff4d4f; color: white; }

        .generate-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 24px;
            width: 100%;
        }

        .generate-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Preview Area */
        .preview-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            background: #e5e5e5;
        }

        .preview-frame {
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }

        .preview-frame img {
            display: block;
            max-width: 100%;
            height: auto;
            max-height: 85vh; /* Keep it visible within screen height */
        }

        .page-tag {
            position: absolute;
            top: -25px;
            left: 0;
            font-size: 0.75rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .empty-state { color: #888; margin-top: 20%; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>PDF Generator</h1>
        <p class="subtitle">Upload, reorder, and convert images to a custom-sized PDF.</p>

        <div class="input-group">
            <label>Add Images</label>
            <input type="file" id="imageInput" accept="image/*" multiple>
        </div>

        <div class="file-list" id="fileList"></div>

        <button id="generateBtn" class="generate-btn" disabled>Download PDF</button>
    </div>

    <div class="preview-area" id="previewArea">
        <div class="empty-state">Your PDF preview will appear here.</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script>
        const imageInput = document.getElementById('imageInput');
        const previewArea = document.getElementById('previewArea');
        const fileList = document.getElementById('fileList');
        const generateBtn = document.getElementById('generateBtn');
        
        let imagesArray = [];

        imageInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const dataUrl = await readFileAsDataURL(file);
                const dims = await getImageDimensions(dataUrl);
                imagesArray.push({ name: file.name, data: dataUrl, w: dims.w, h: dims.h });
            }
            render();
            imageInput.value = '';
        });

        function readFileAsDataURL(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        function getImageDimensions(src) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve({ w: img.width, h: img.height });
                img.src = src;
            });
        }

        // Move item in array
        function moveItem(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= imagesArray.length) return;
            const element = imagesArray.splice(index, 1)[0];
            imagesArray.splice(newIndex, 0, element);
            render();
        }

        function render() {
            fileList.innerHTML = '';
            previewArea.innerHTML = '';
            
            if (imagesArray.length === 0) {
                previewArea.innerHTML = '<div class="empty-state">Your PDF preview will appear here.</div>';
                generateBtn.disabled = true;
                return;
            }

            generateBtn.disabled = false;

            imagesArray.forEach((img, i) => {
                // --- SIDEBAR LIST ---
                const item = document.createElement('div');
                item.className = 'file-item';
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'file-name';
                nameSpan.innerText = `${i + 1}. ${img.name}`;
                
                const controls = document.createElement('div');
                controls.className = 'controls';

                // Up Button
                const upBtn = document.createElement('button');
                upBtn.className = 'control-btn';
                upBtn.innerHTML = '↑';
                upBtn.disabled = (i === 0);
                upBtn.onclick = () => moveItem(i, -1);

                // Down Button
                const downBtn = document.createElement('button');
                downBtn.className = 'control-btn';
                downBtn.innerHTML = '↓';
                downBtn.disabled = (i === imagesArray.length - 1);
                downBtn.onclick = () => moveItem(i, 1);

                // Delete Button
                const delBtn = document.createElement('button');
                delBtn.className = 'control-btn remove-btn';
                delBtn.innerHTML = '✕';
                delBtn.onclick = () => { imagesArray.splice(i, 1); render(); };

                controls.appendChild(upBtn);
                controls.appendChild(downBtn);
                controls.appendChild(delBtn);
                
                item.appendChild(nameSpan);
                item.appendChild(controls);
                fileList.appendChild(item);

                // --- PREVIEW AREA ---
                const frame = document.createElement('div');
                frame.className = 'preview-frame';
                frame.style.width = img.w > img.h ? '800px' : '500px'; // Adaptive preview sizing
                
                const tag = document.createElement('div');
                tag.className = 'page-tag';
                tag.innerText = `Page ${i + 1}`;

                const previewImg = document.createElement('img');
                previewImg.src = img.data;
                
                frame.appendChild(tag);
                frame.appendChild(previewImg);
                previewArea.appendChild(frame);
            });
        }

        generateBtn.addEventListener('click', () => {
            const { jsPDF } = window.jspdf;
            
            // First page setup
            const pdf = new jsPDF({
                orientation: imagesArray[0].w > imagesArray[0].h ? 'l' : 'p',
                unit: 'px',
                format: [imagesArray[0].w, imagesArray[0].h]
            });

            imagesArray.forEach((img, i) => {
                if (i > 0) {
                    pdf.addPage([img.w, img.h], img.w > img.h ? 'l' : 'p');
                }
                const format = img.data.includes('png') ? 'PNG' : 'JPEG';
                pdf.addImage(img.data, format, 0, 0, img.w, img.h);
            });

            pdf.save('reordered_document.pdf');
        });
    </script>
</body>
</html>
